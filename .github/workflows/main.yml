name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Package and Dev Tools
        run: |
          pip install -e ".[dev]"
      
      - name: Run Lint (Ruff)
        run: ruff check .
      
      - name: Run Tests (Pytest)
        run: pytest tests/

  update-dashboard:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || contains(github.event.head_commit.message, 'update data')
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install .
      
      - name: Run Update Script
        run: dengueboard-update
      
      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data_processed/dashboard_data.json
          git commit -m "Update: Data synchronization" || exit 0
          git push
