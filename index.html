<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSERVATÓRIO HISTÓRICO | Alto Tietê</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f19; --card: #151c2c; --accent: #3b82f6; --text: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        .sidebar { position: fixed; width: 300px; height: 100vh; background: var(--card); border-right: 1px solid #2d3748; padding: 20px; box-sizing: border-box; }
        .main-content { margin-left: 300px; padding: 40px; }
        
        .metric-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid #334155; }
        .metric-value { font-size: 2.5rem; font-weight: 800; color: var(--accent); }
        
        .chart-box { background: var(--card); padding: 1.5rem; border-radius: 16px; border: 1px solid #2d3748; margin-bottom: 2rem; }
        
        select { background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
        
        h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; }
        h2 { font-size: 1.5rem; margin-bottom: 1.5rem; }
        
        @media (max-width: 900px) {
            .sidebar { position: relative; width: 100%; height: auto; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>📡 Monitor Histórico</h1>
    <p style="font-size: 0.8rem; color: #64748b;">Análise Epidemiológica 2000-2024</p>
    
    <div style="margin-top: 40px;">
        <label>Selecione o Município:</label>
        <select id="mun-selector" onchange="updateCharts()">
            <option value="TODOS">Todos os Municípios</option>
        </select>
    </div>

    <div style="margin-top: 40px;">
        <div class="metric-card">
            <span style="font-size: 0.8rem; color: #94a3b8;">TOTAL DE CASOS (SÉRIE)</span>
            <div class="metric-value" id="total-casos">-</div>
        </div>
    </div>
    
    <div style="position: absolute; bottom: 20px; font-size: 0.7rem; color: #475569;">
        Última Sincronização: <br> <span id="last-update">-</span>
    </div>
</div>

<div class="main-content">
    <div class="chart-box">
        <h2>📈 Série Histórica Mensal (Acumulada)</h2>
        <div id="plot-history" style="height: 450px;"></div>
    </div>

    <div class="chart-box">
        <h2>📊 Comparativo de Surtos por Ano</h2>
        <div id="plot-yearly" style="height: 400px;"></div>
    </div>
</div>

<script>
    let globalData = null;

    async function init() {
        const res = await fetch('data_processed/dashboard_data.json');
        globalData = await res.json();
        
        document.getElementById('last-update').innerText = globalData.last_update;
        document.getElementById('total-casos').innerText = globalData.total_historico.toLocaleString();

        // Popular seletor
        const selector = document.getElementById('mun-selector');
        globalData.municipios.sort().forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.innerText = m;
            selector.appendChild(opt);
        });

        updateCharts();
    }

    function updateCharts() {
        const selectedMun = document.getElementById('mun-selector').value;
        const layout = {
            paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#e2e8f0', family: 'Inter' },
            xaxis: { gridcolor: '#1e293b' }, yaxis: { gridcolor: '#1e293b' },
            margin: { t: 10, b: 40, l: 60, r: 20 }
        };

        // 1. Gráfico Série Mensal
        let filteredSeries = globalData.series_mensal;
        if(selectedMun !== 'TODOS') {
            filteredSeries = filteredSeries.filter(d => d.MUNICIPIO === selectedMun);
        }
        
        const seriesAgg = filteredSeries.reduce((acc, d) => {
            acc[d.MES_ANO] = (acc[d.MES_ANO] || 0) + d.CASOS;
            return acc;
        }, {});

        Plotly.newPlot('plot-history', [{
            x: Object.keys(seriesAgg),
            y: Object.values(seriesAgg),
            type: 'scatter', mode: 'lines', fill: 'tozeroy',
            line: { color: '#3b82f6', width: 3 }
        }], layout, {responsive: true});

        // 2. Gráfico Yearly
        let filteredYearly = globalData.stats_ano;
        if(selectedMun !== 'TODOS') {
            filteredYearly = filteredYearly.filter(d => d.MUNICIPIO === selectedMun);
        }

        const yearlyAgg = filteredYearly.reduce((acc, d) => {
            acc[d.NU_ANO] = (acc[d.NU_ANO] || 0) + d.CASOS;
            return acc;
        }, {});

        Plotly.newPlot('plot-yearly', [{
            x: Object.keys(yearlyAgg),
            y: Object.values(yearlyAgg),
            type: 'bar', marker: { color: '#ef4444' }
        }], layout, {responsive: true});
    }

    init();
</script>
</body>
</html>
