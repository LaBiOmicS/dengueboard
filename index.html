<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Gabinete de Crise | Vigilância Dengue Alto Tietê</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.css" />
    <style>
      #loading-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0f172a; display: flex; flex-direction: column;
        justify-content: center; align-items: center; z-index: 9999;
        color: white; font-family: sans-serif;
      }
      .spinner { border: 4px solid #1e293b; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading-overlay"><div class="spinner"></div><p>Carregando Inteligência Epidemiológica...</p></div>
    <div id="stlite"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["pandas", "plotly", "requests"],
          entrypoint: "app.py",
          files: {
            "app.py": `
import sys
from types import ModuleType
pa = ModuleType('pyarrow'); pa.Table = type('Table', (), {}); pa.ChunkedArray = type('ChunkedArray', (), {}); sys.modules['pyarrow'] = pa

import streamlit as st
import pandas as pd
import plotly.express as px
import requests
import time

st.set_page_config(page_title="Vigilância Dengue Alto Tietê", layout="wide")

# CSS para tornar a UI profissional
st.markdown("""
<style>
    #loading-overlay { display: none; }
    .main { background-color: #0f172a; }
    div[data-testid="stMetricValue"] { font-size: 2rem; color: #3b82f6; font-weight: 800; }
    .stSelectbox label { color: #94a3b8 !important; font-weight: 600; }
</style>
""", unsafe_allow_html=True)

@st.cache_data
def load_data():
    url = f"https://raw.githubusercontent.com/LaBiOmicS/dengueboard/main/data_processed/dashboard_data.json?t={int(time.time())}"
    try:
        r = requests.get(url, timeout=10)
        return r.json() if r.status_code == 200 else None
    except: return None

data = load_data()
if not data:
    st.error("Erro ao carregar dados. Verifique a conexão.")
    st.stop()

# --- SIDEBAR E FILTROS ---
st.sidebar.image("https://img.icons8.com/fluency/96/virus.png", width=80)
st.sidebar.title("Filtros Estratégicos")

municipios = sorted(list(data['stats'].keys()))
selecao = st.sidebar.multiselect("Filtrar Municípios", ["TODOS"] + municipios, default=["TODOS"])

anos = data['anos_disponiveis']
periodo = st.sidebar.slider("Recorte Temporal", min(anos), max(anos), (min(anos), max(anos)))

# --- PROCESSAMENTO ---
df = pd.DataFrame(data['serie_historica'])
df['MES_ANO'] = pd.to_datetime(df['MES_ANO'])
df['ANO'] = df['MES_ANO'].dt.year

# Aplicação dos Filtros
if "TODOS" not in selecao and selecao:
    df = df[df['MUNICIPIO'].isin(selecao)]
    
df = df[(df['ANO'] >= periodo[0]) & (df['ANO'] <= periodo[1])]

# --- UI PRINCIPAL ---
st.title("🛰️ Observatório de Arboviroses | Alto Tietê")
st.caption(f"Dados atualizados do SINAN/SUS em: {data['last_update']}")

# Linha de Métricas
m1, m2, m3 = st.columns(3)
total_periodo = df['CASOS'].sum()
m1.metric("Total de Casos no Período", f"{total_periodo:,}")
m2.metric("Período de Análise", f"{periodo[0]} - {periodo[1]}")
m3.metric("Municípios em Foco", len(selecao) if "TODOS" not in selecao else 11)

# Gráfico de Área (Série Histórica)
st.subheader("📈 Curva Epidemiológica Histórica")
df_plot = df.groupby('MES_ANO')['CASOS'].sum().reset_index()
fig = px.area(df_plot, x='MES_ANO', y='CASOS', 
              color_discrete_sequence=['#3b82f6'], 
              labels={'MES_ANO': 'Mês/Ano', 'CASOS': 'Número de Notificações'})
fig.update_layout(template="plotly_dark", hovermode="x unified", height=500)
st.plotly_chart(fig, use_container_width=True)

# Grid Inferior
c1, c2 = st.columns([2, 1])

with c1:
    st.subheader("🚩 Ranking de Incidência por Município")
    df_rank = df.groupby('MUNICIPIO')['CASOS'].sum().sort_values(ascending=False).reset_index()
    # Adicionar taxa por 100k
    df_rank['INCIDÊNCIA'] = df_rank.apply(lambda row: round((row['CASOS'] / data['stats'][row['MUNICIPIO']]['populacao']) * 100000, 1), axis=1)
    
    fig_rank = px.bar(df_rank, x='INCIDÊNCIA', y='MUNICIPIO', orientation='h', 
                      color='INCIDÊNCIA', color_continuous_scale='Reds',
                      labels={'INCIDÊNCIA': 'Casos por 100k Hab.'})
    fig_rank.update_layout(template="plotly_dark", yaxis={'autorange': 'reversed'})
    st.plotly_chart(fig_rank, use_container_width=True)

with c2:
    st.subheader("📋 Resumo Regional")
    st.dataframe(df_rank[['MUNICIPIO', 'CASOS', 'INCIDÊNCIA']], hide_index=True, use_container_width=True)
    st.download_button("Exportar Dados (CSV)", df.to_csv(index=False), "dados_alto_tiete.csv")

st.info("💡 **Dica do Gestor:** A incidência acima de 300 casos por 100 mil habitantes indica estado de epidemia.")
`
          }
        },
        document.getElementById("stlite")
      );
    </script>
  </body>
</html>
