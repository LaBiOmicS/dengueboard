<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Observatório Dengue Alto Tietê | Powered by Pyodide</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.css" />
  </head>
  <body>
    <div id="stlite"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["pandas", "plotly", "requests", "nbformat"], // Adicionado 'requests' aqui
          entrypoint: "app.py",
          files: {
            "app.py": `
import streamlit as st
import pandas as pd
import plotly.express as px
import plotly.graph_objects as go
import json
import requests  # Adicionado import aqui

st.set_page_config(page_title="Observatório Dengue Alto Tietê", layout="wide")

st.markdown("""
    <style>
    .main { background-color: #0e1117; }
    .stMetric { background-color: #1e293b; padding: 15px; border-radius: 10px; border: 1px solid #334155; }
    </style>
    """, unsafe_allow_html=True)

@st.cache_data
def load_data():
    # Usando URL absoluta para evitar ambiguidades no ambiente virtual
    url = "https://raw.githubusercontent.com/LaBiOmicS/dengueboard/main/data_processed/dashboard_data.json"
    try:
        response = requests.get(url)
        response.raise_for_status()
        return response.json()
    except Exception as e:
        st.error(f"Erro ao carregar dados: {e}")
        return None

data = load_data()

if data is None:
    st.warning("Aguardando carregamento dos dados do GitHub...")
    st.stop()

st.title("📡 Observatório Epidemiológico Alto Tietê")
st.caption(f"Última atualização dos dados: {data['last_update']}")

st.sidebar.header("Configurações de Análise")
mun_list = ["TODOS"] + sorted(data['municipios'])
selected_mun = st.sidebar.selectbox("Selecione o Município", mun_list)

df_mensal = pd.DataFrame(data['series_mensal'])
df_mensal['MES_ANO'] = pd.to_datetime(df_mensal['MES_ANO'])

if selected_mun != "TODOS":
    df_plot = df_mensal[df_mensal['MUNICIPIO'] == selected_mun]
    total_casos = df_plot['CASOS'].sum()
else:
    df_plot = df_mensal.groupby('MES_ANO')['CASOS'].sum().reset_index()
    total_casos = data['total_historico']

col1, col2, col3 = st.columns(3)
col1.metric("Total Acumulado (Série)", f"{total_casos:,}")
col2.metric("Municípios Monitorados", len(data['municipios']))
col3.metric("Status do Sistema", "Ativo / 30min")

st.subheader("📈 Evolução Histórica (2000 - Atual)")
fig_hist = px.area(df_plot, x='MES_ANO', y='CASOS', 
                   title=f"Tendência Temporal: {selected_mun}",
                   color_discrete_sequence=['#3b82f6'])
fig_hist.update_layout(template="plotly_dark", hovermode="x unified")
st.plotly_chart(fig_hist, use_container_width=True)

st.subheader("📊 Distribuição de Surtos por Ano")
df_ano = pd.DataFrame(data['stats_ano'])
if selected_mun != "TODOS":
    df_ano_plot = df_ano[df_ano['MUNICIPIO'] == selected_mun]
else:
    df_ano_plot = df_ano.groupby('NU_ANO')['CASOS'].sum().reset_index()

fig_ano = px.bar(df_ano_plot, x='NU_ANO', y='CASOS', color='CASOS',
                 color_continuous_scale='Reds')
fig_ano.update_layout(template="plotly_dark")
st.plotly_chart(fig_ano, use_container_width=True)

with st.expander("📂 Visualizar Dados Consolidados"):
    st.dataframe(df_plot, use_container_width=True)
    st.download_button("Baixar CSV da Consulta", df_plot.to_csv(index=False), "dados_dengue.csv", "text/csv")
            `
          },
        },
        document.getElementById("stlite")
      );
    </script>
  </body>
</html>
